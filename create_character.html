<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Hero - Darkstone Chronicles</title>
  <link rel="stylesheet" href="style.css?v=20260415-095226">
</head>
<body class="charCreatePage">
  <div class="charCreateWrap">
    <div class="charCreateCard">
      <h1>Create Your Hero</h1>
      <div class="charCreateSub">Choose a portrait and enter a name to begin.</div>

      <div id="heroChoiceGrid" class="heroChoiceGrid">
        <button type="button" class="heroChoiceCard heroChoiceActive" data-hero-key="vanguard" data-hero-img="images/heroes/hero_1.png">
          <img src="images/heroes/hero_1.png" alt="Vanguard">
          <span>Vanguard</span>
        </button>
        <button type="button" class="heroChoiceCard" data-hero-key="cryptblade" data-hero-img="images/heroes/hero_2.png">
          <img src="images/heroes/hero_2.png" alt="Cryptblade">
          <span>Cryptblade</span>
        </button>
        <button type="button" class="heroChoiceCard" data-hero-key="arcanist" data-hero-img="images/heroes/hero_3.png">
          <img src="images/heroes/hero_3.png" alt="Arcanist">
          <span>Arcanist</span>
        </button>
      </div>

      <div class="charCreateField">
        <label for="heroNameInput">Hero Name</label>
        <input id="heroNameInput" type="text" maxlength="20" placeholder="Enter hero name">
      </div>

      <div class="charCreatePreview">
        <img id="heroPreviewImg" src="images/heroes/hero_1.png" alt="Hero Preview">
        <div class="charCreatePreviewMeta">
          <div id="heroPreviewClass" class="charCreatePreviewClass">Vanguard</div>
          <div id="heroPreviewName" class="charCreatePreviewName">Hero</div>
        </div>
      </div>

      <div id="charCreateMsg" class="charCreateMsg"></div>

      <div class="charCreateActions">
        <button type="button" id="createHeroBtn" class="townBtn">Create Hero</button>
      </div>
    </div>
  </div>

  <script src="auth.js?v=20260415-095226"></script>
  <script src="create_character.js?v=20260415-095226"></script>
</body>
</html>
