<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darkstone Chronicles - Challenges</title>
  <link rel="icon" type="image/png" href="images/ui/favicon.webp">
  <link rel="stylesheet" href="style.css?v=20260502-160507">
  <style id="dsBootShellStyles">
    html{background-color:var(--bg-fallback,#090a10);}
    body{margin:0;background:transparent;}
    #dsBootOverlay{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top, rgba(69,82,129,.18), transparent 42%), linear-gradient(180deg,#0b0d14 0%,#090a10 100%);color:#f4f1e8;font-family:Georgia,serif;letter-spacing:.04em;transition:opacity .24s ease, visibility .24s ease;}
    #dsBootOverlay.is-hidden{opacity:0;visibility:hidden;pointer-events:none;}
    .dsBootOverlayCard{min-width:min(88vw,340px);padding:16px 20px;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(17,20,31,.86);box-shadow:0 18px 48px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.05);text-align:center;}
    .dsBootOverlayTitle{font-size:14px;font-weight:700;text-transform:uppercase;opacity:.82;}
    .dsBootOverlayName{margin-top:6px;font-size:24px;font-weight:900;}
    .dsBootOverlayHint{margin-top:10px;font-size:12px;opacity:.7;}
  </style>
  <script id="dsBootShellScript">
    (function(){
      window.__dsBootReady = function(){
        var root = document.documentElement;
        var overlay = document.getElementById('dsBootOverlay');
        root.classList.add('ds-boot-ready');
        if (!overlay) return;
        overlay.classList.add('is-hidden');
        window.setTimeout(function(){ if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 260);
      };
    })();
  </script>
</head>
<body>
  <div id="dsBootOverlay" aria-hidden="true">
    <div class="dsBootOverlayCard">
      <div class="dsBootOverlayTitle">Loading</div>
      <div class="dsBootOverlayName">Darkstone Chronicles</div>
      <div class="dsBootOverlayHint">Preparing your session...</div>
    </div>
  </div>
  <div id="hudRoot"></div>

  <div id="mainLayout">
    <div id="leftPanel">
      <h1 style="margin-bottom:6px;">Challenges</h1>
      <div style="opacity:.85;margin-bottom:14px;font-style:italic;">
        Pick a challenge category and track your progress.
      </div>

      <div id="homeHub">
        <button class="hubNav" id="challengeTypeFight">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#9876;&#65039;</span>
          </span>
          <span class="hubLabel">Fighting</span>
        </button>
        <button class="hubNav" id="challengeTypeGathering">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#9935;&#65039;</span>
          </span>
          <span class="hubLabel">Gathering</span>
        </button>
        <button class="hubNav" id="challengeTypeArtisan">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#9874;&#65039;</span>
          </span>
          <span class="hubLabel">Artisan</span>
        </button>
      </div>

      <div id="challengeSubtypes" style="display:none;max-width:900px;margin:8px auto 0;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;"></div>
      <div id="challengeList" style="display:none;max-width:900px;margin:16px auto 0;"></div>
    </div>

    <div id="inventoryPanel">
      <div class="invHeader">
        <div class="invTitle">
          <span id="invTitleText">Inventory</span>
          <span id="invCap" style="opacity:.85;font-size:12px;"></span>
        </div>
        <div class="invGold"><span id="goldValue">0</span></div>
      </div>
      <div id="inventoryGrid"></div>
    </div>
  </div>

  <script src="auth.js?v=20260502-160507"></script>
  <script src="ui.js?v=20260502-160507"></script>
  <script src="index.js?v=20260502-160507"></script>

  <script src="bank.js?v=20260502-160507"></script>

  <script src="equipment.js?v=20260502-160507"></script>
  <script src="stats.js?v=20260502-160507"></script>

  <script src="forge.js?v=20260502-160507"></script>

</body>
