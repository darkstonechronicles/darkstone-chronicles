<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darkstone Chronicles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="hudRoot"></div>

  <div id="mainLayout">
    <div id="leftPanel">
      <h1 style="margin-bottom:6px;">Darkstone Chronicles</h1>
      <div style="opacity:.85;margin-bottom:14px;">
        Welcome back to town. Choose your next path.
      </div>

      <div style="margin:10px 0 16px; display:flex; gap:10px; justify-content:center;">
        <button class="townBtn" id="resetSaveBtn" style="border-color:#663; background:#2a1f12;">
          Reset Save
        </button>
      </div>

      <div id="homeHub">
        <button class="hubNav" id="goFight">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#9876;&#65039;</span>
          </span>
          <span class="hubLabel">Fighting Fields</span>
        </button>

        <button class="hubNav" id="goProfessions">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#9874;&#65039;</span>
          </span>
          <span class="hubLabel">Professions</span>
        </button>

        <button class="hubNav" id="goDungeons">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#127984;</span>
          </span>
          <span class="hubLabel">Dungeons</span>
        </button>

        <button class="hubNav" id="goBuildings">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#127970;</span>
          </span>
          <span class="hubLabel">Buildings</span>
        </button>

        <button class="hubNav" id="goChallenges">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#127919;</span>
          </span>
          <span class="hubLabel">Challenges</span>
        </button>

        <button class="hubNav" id="goEquip">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#128737;&#65039;</span>
          </span>
          <span class="hubLabel">Equipment</span>
        </button>

        <button class="hubNav" id="goMarket">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#128176;</span>
          </span>
          <span class="hubLabel">Market</span>
        </button>

        <button class="hubNav" id="goBank">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#127974;</span>
          </span>
          <span class="hubLabel">Bank</span>
        </button>

        <button class="hubNav" id="goStats">
          <span class="hubIconFrame">
            <span class="hubEmoji" aria-hidden="true">&#128202;</span>
          </span>
          <span class="hubLabel">My Stats</span>
        </button>
      </div>

      <h2 style="margin:18px 0 10px;">Town Log</h2>
      <div id="log"></div>
    </div>

    <div id="inventoryPanel">
      <div class="invHeader">
        <div class="invTitle">
          <span id="invTitleText">Inventory</span>
          <span id="invCap" style="opacity:.85;font-size:12px;"></span>
        </div>
        <div class="invGold"><span id="goldValue">0</span></div>
      </div>
      <div id="inventoryGrid"></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="ui.js"></script>
  <script src="index.js"></script>
</body>
</html>
