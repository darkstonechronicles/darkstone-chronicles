<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Darkstone Chronicles - Forge</title>
  <link rel="stylesheet" href="style.css?v=20260418-152638"/>
  <style>
    #forgeTabs{
      display:flex;
      gap:48px;
      margin:0 0 14px;
      justify-content:center;
    }
    .forgeTabBtn{
      min-width:170px;
      padding:16px 18px;
      border-radius:12px;
      border:1px solid var(--btn-premium-border);
      background:var(--btn-premium-bg);
      color:#f1f2f6;
      font-weight:800;
      letter-spacing:.2px;
      text-shadow:0 1px 0 rgba(0,0,0,.75);
      box-shadow:var(--btn-premium-shadow);
      cursor:pointer;
      transition:
        transform .14s ease,
        border-color .14s ease,
        box-shadow .14s ease,
        filter .14s ease,
        opacity .14s ease;
      opacity:.78;
    }
    .forgeTabBtn:hover{
      transform:translateY(-1px);
      border-color:var(--btn-premium-hover-border);
      box-shadow:
        0 14px 28px rgba(0,0,0,.3),
        0 0 0 1px rgba(0,0,0,.48),
        0 0 18px var(--btn-premium-hover-glow),
        inset 0 1px 0 rgba(255,255,255,.12),
        inset 0 -1px 0 rgba(0,0,0,.3);
      filter:brightness(1.03);
      opacity:1;
    }
    .forgeTabBtn:active{
      transform:translateY(1px);
      box-shadow:
        0 8px 18px rgba(0,0,0,.24),
        0 0 0 1px rgba(0,0,0,.45),
        inset 0 2px 3px rgba(0,0,0,.24),
        inset 0 1px 0 rgba(255,255,255,.05);
    }
    .forgeTabBtn.is-active{
      border-color:var(--btn-premium-primary-border);
      background:var(--btn-premium-primary-bg);
      color:#f6e7c5;
      box-shadow:
        0 12px 24px rgba(0,0,0,.28),
        0 0 0 1px rgba(0,0,0,.45),
        0 0 24px rgba(228,181,77,.28),
        inset 0 1px 0 rgba(255,255,255,.10),
        inset 0 2px 0 rgba(255,245,210,.18),
        inset 0 -2px 0 rgba(0,0,0,.32);
      filter:brightness(1.06);
      opacity:1;
    }
    .forgeTabBtn.is-active:hover{
      border-color:#dfb15a;
      box-shadow:
        0 14px 28px rgba(0,0,0,.32),
        0 0 0 1px rgba(0,0,0,.5),
        0 0 22px rgba(228,181,77,.24),
        inset 0 1px 0 rgba(255,255,255,.14),
        inset 0 -1px 0 rgba(0,0,0,.26);
    }
  </style>
  <style id="dsBootShellStyles">
    html{background-color:var(--bg-fallback,#090a10);}
    body{margin:0;background:transparent;}
    #dsBootOverlay{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top, rgba(69,82,129,.18), transparent 42%), linear-gradient(180deg,#0b0d14 0%,#090a10 100%);color:#f4f1e8;font-family:Georgia,serif;letter-spacing:.04em;transition:opacity .24s ease, visibility .24s ease;}
    #dsBootOverlay.is-hidden{opacity:0;visibility:hidden;pointer-events:none;}
    .dsBootOverlayCard{min-width:min(88vw,340px);padding:16px 20px;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(17,20,31,.86);box-shadow:0 18px 48px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.05);text-align:center;}
    .dsBootOverlayTitle{font-size:14px;font-weight:700;text-transform:uppercase;opacity:.82;}
    .dsBootOverlayName{margin-top:6px;font-size:24px;font-weight:900;}
    .dsBootOverlayHint{margin-top:10px;font-size:12px;opacity:.7;}
  </style>
  <script id="dsBootShellScript">
    (function(){
      window.__dsBootReady = function(){
        var root = document.documentElement;
        var overlay = document.getElementById('dsBootOverlay');
        root.classList.add('ds-boot-ready');
        if (!overlay) return;
        overlay.classList.add('is-hidden');
        window.setTimeout(function(){ if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 260);
      };
    })();
  </script>
</head>
<body>
  <div id="dsBootOverlay" aria-hidden="true">
    <div class="dsBootOverlayCard">
      <div class="dsBootOverlayTitle">Loading</div>
      <div class="dsBootOverlayName">Darkstone Chronicles</div>
      <div class="dsBootOverlayHint">Preparing your session...</div>
    </div>
  </div>
  <div id="hudRoot"></div>

  <div id="mainLayout">
    <div id="leftPanel">
      <div style="max-width:340px;margin:0 auto 12px;">
        <div style="background:#151520;border:2px solid #333;border-radius:12px;padding:10px 12px;width:100%;">
          <div style="font-weight:900;font-size:18px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;text-align:center;">
            <span aria-hidden="true">&#9874;&#65039;</span>
            <span>Forge Lvl: <span id="bsLevel">1</span></span>
          </div>
          <div style="width:100%;">
            <div style="height:12px;background:#0f0f16;border:1px solid #2a2a3a;border-radius:999px;overflow:hidden;position:relative;">
                <div id="bsXPBar" style="height:100%;width:0%;background:#7dff9f;"></div>
                <div style="position:absolute;top:50%;left:8px;transform:translateY(-50%);font-size:11px;font-weight:800;line-height:1;color:#f4f1e8;text-shadow:0 1px 3px rgba(0,0,0,.75);pointer-events:none;">XP</div>
                <div style="position:absolute;top:50%;right:8px;transform:translateY(-50%);font-size:11px;font-weight:800;line-height:1;color:#f4f1e8;text-shadow:0 1px 3px rgba(0,0,0,.75);pointer-events:none;"><span id="bsXPCurrent">0</span>/<span id="bsXPNext">100</span></div>
              </div>
          </div>
        </div>
      </div>

      <div style="max-width:900px;margin:0 auto;">
        <div id="forgeTabs">
          <button id="tabSmelt" class="forgeTabBtn is-active" type="button">Smelt Bars</button>
          <button id="tabCraft" class="forgeTabBtn" type="button">Craft Items</button>
        </div>

        <div id="forgeSmeltPanel">
          <h2 style="margin:0 0 10px;">Choose a Bar to Smelt</h2>
          <div id="barGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;"></div>
        </div>

        <div id="forgeCraftPanel" style="display:none;">
          <h2 style="margin:0 0 10px;">Craft Items</h2>
          <div id="craftCategoryView">
            <div id="craftMaterialTabs" style="display:flex;gap:10px;flex-wrap:wrap;margin:0 0 12px;"></div>
          </div>
          <div id="craftItemsView" style="display:none;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 12px;">
              <div id="craftItemsTitle" style="font-size:18px;font-weight:800;"></div>
              <button id="craftBackBtn" type="button" style="padding:8px 12px;border-radius:10px;border:2px solid #2a2a3a;background:#151520;color:#cfcfe6;font-weight:800;cursor:pointer;">Back</button>
            </div>
            <div id="craftGrid" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="inventoryPanel">
      <div class="invHeader">
        <div class="invTitle"><span id="invTitleText">Inventory</span></div>
        <div class="invGold"><span id="goldValue">0</span></div>
      </div>
      <div id="inventoryGrid"></div>
    </div>
  </div>
