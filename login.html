<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darkstone Chronicles - Login</title>
  <link rel="stylesheet" href="style.css?v=spa35500a7">
</head>
<body class="charCreatePage">
  <div class="charCreateWrap">
    <div class="charCreateCard loginCard">
      <h1>Darkstone Chronicles</h1>
      <div id="loginSub" class="charCreateSub">Sign in to continue your adventure.</div>

      <div class="loginHighlights">
        <div class="loginHighlight">Google login</div>
        <div class="loginHighlight">Persistent account session</div>
        <div class="loginHighlight">Ready for cloud save next</div>
      </div>

      <div class="charCreatePreview loginPreview">
        <img src="images/heroes/hero_1.png" alt="Hero Preview">
        <div class="charCreatePreviewMeta">
          <div class="charCreatePreviewClass">Account Login</div>
          <div class="charCreatePreviewName">Enter The Realm</div>
        </div>
      </div>

      <div id="loginStatus" class="charCreateMsg"></div>

      <div class="charCreateActions">
        <button type="button" id="googleLoginBtn" class="townBtn loginBtn">Sign In With Google</button>
      </div>
    </div>
  </div>

  <script src="auth.js?v=spa35500a7"></script>
  <script src="login.js?v=spa35500a7"></script>
</body>
</html>
